name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install server dependencies
        run: cd server && npm ci
      - name: Install client dependencies
        run: cd client && npm ci
      - name: Lint server
        run: cd server && npx eslint src/
      - name: Lint client
        run: cd client && npx eslint src/

  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: dogcare_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install server dependencies
        run: cd server && npm ci
      - name: Initialize test database
        run: PGPASSWORD=postgres psql -h localhost -U postgres -d dogcare_test -f server/src/db/init.sql
      - name: Run backend tests
        run: cd server && npm test
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: dogcare_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: ci-test-secret-key
          JWT_EXPIRES_IN: 24h

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install client dependencies
        run: cd client && npm ci
      - name: Run frontend tests
        run: cd client && npm test -- --run

  build:
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install client dependencies
        run: cd client && npm ci
      - name: Build frontend
        run: cd client && npm run build
